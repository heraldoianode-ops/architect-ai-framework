version: "3.9"

services:
  # ─── PostgreSQL 16 + pgvector ───────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ars_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-asistente_real_state}
      POSTGRES_USER: ${POSTGRES_USER:-ars_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ars_user} -d ${POSTGRES_DB:-asistente_real_state}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ars_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Ollama (LLM local — costo ZERO) ────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ars_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=2
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        reservations:
          memory: 4G

  # ─── Ollama model pull (one-shot, runs on first up) ─────────────────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: ars_ollama_init
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      /bin/sh -c "
        ollama pull llama3.1:8b &&
        ollama pull nomic-embed-text &&
        echo 'Models ready.'
      "
    restart: "no"

  # ─── FastAPI Backend (Python orquestador) ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ars_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ars_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-asistente_real_state}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
      ALLOW_EXTERNAL_LLM: ${ALLOW_EXTERNAL_LLM:-false}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Celery Worker (background tasks: scraping, analytics) ──────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ars_celery_worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ars_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-asistente_real_state}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
      ALLOW_EXTERNAL_LLM: ${ALLOW_EXTERNAL_LLM:-false}
      JWT_SECRET: ${JWT_SECRET}
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app

  # ─── Celery Beat (scheduler) ─────────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ars_celery_beat
    restart: unless-stopped
    depends_on:
      - celery-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ars_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-asistente_real_state}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
    command: celery -A app.workers.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app

  # ─── Node.js WhatsApp Gateway ────────────────────────────────────────────────
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: ars_gateway
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PORT: 3000
      FASTAPI_URL: http://backend:8000
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:-}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      NODE_ENV: ${ENVIRONMENT:-development}
    ports:
      - "3000:3000"
    volumes:
      - ./gateway/src:/app/src

volumes:
  postgres_data:
  redis_data:
  ollama_data:

networks:
  default:
    name: ars_network
